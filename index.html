<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civica</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-rule"></div>
    <div class="header-inner">
      <h1 class="site-title">Civica</h1>
      <p class="site-subtitle"><span id="currentDate"></span></p>
    </div>
    <div class="header-rule"></div>
  </header>

  <!-- NEWS SECTION -->
  <main>
    <div class="news-container">
      <div class="news-grid" id="newsGrid">
        <!-- News cards injected by JS -->
      </div>
    </div>
  </main>

  <!-- NEWS MODAL -->
  <div class="news-modal-overlay" id="newsModalOverlay" hidden>
    <div class="news-modal">
      <div class="news-modal-header">
        <div>
          <h2 class="news-modal-title" id="newsModalTitle"></h2>
          <div class="news-modal-tags" id="newsModalTags"></div>
        </div>
        <button class="news-modal-close" id="newsModalClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="news-modal-body">
        <img id="newsModalImage" class="news-modal-image" alt="">
        <div class="news-modal-meta">
          <span class="news-modal-date" id="newsModalDate"></span>
        </div>
        <p class="news-modal-text" id="newsModalText"></p>
      </div>
    </div>
  </div>

  <script src="news.js"></script>
  <script src="news-render.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('currentDate').textContent =
        new Date().toLocaleDateString('es-ES', options);
    });
  </script>
</body>
</html>
