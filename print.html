<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Edición Semanal - Civica</title>
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #000; font-family: Georgia, 'Times New Roman', serif; }
    
    @page {
      size: A4 portrait;
      margin: 1.5cm;
    }

    /* Controles (ocultos al imprimir) */
    .print-controls {
      text-align: center;
      padding: 15px;
      background: #f0f0f0;
      margin-bottom: 20px;
    }
    .print-controls button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      background: #c0392b;
      color: #fff;
      border: none;
      font-family: sans-serif;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Cabecera del Periódico */
    .newspaper-header {
      text-align: center;
      border-bottom: 4px double #000;
      border-top: 2px solid #000;
      padding: 15px 0;
      margin-bottom: 25px;
    }
    .newspaper-title {
      font-size: 4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 5px;
    }
    .newspaper-meta {
      font-size: 1rem;
      text-transform: uppercase;
      font-style: italic;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      padding: 5px 0;
      margin-top: 15px;
    }

    /* Layout */
    .featured-article {
      margin-bottom: 25px;
      border-bottom: 2px solid #000;
      padding-bottom: 20px;
    }
    .featured-article .headline {
      font-size: 2.5rem;
      line-height: 1.1;
      margin-bottom: 10px;
      font-weight: bold;
    }
    
    .columns {
      column-count: 3;
      column-gap: 25px;
      column-rule: 1px solid #ccc;
    }
    
    .article {
      break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 25px;
    }
    .headline {
      font-size: 1.3rem;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .article-meta {
      font-size: 0.85rem;
      color: #333;
      margin-bottom: 10px;
      font-style: italic;
    }
    .article-content {
      font-size: 0.95rem;
      line-height: 1.4;
      text-align: justify;
    }

    .no-news {
      text-align: center;
      font-size: 1.5rem;
      padding: 50px;
    }

    @media print {
      .print-controls { display: none !important; }
      .newspaper-header { margin-top: 0; }
    }
  </style>
</head>
<body>

  <div class="print-controls">
    <button onclick="window.print()">Imprimir / Guardar PDF</button>
  </div>

  <header class="newspaper-header">
    <div class="newspaper-title">Civica</div>
    <div class="newspaper-meta">
      <span>Edición Semanal</span>
      <span id="currentDateLabel"></span>
    </div>
  </header>

  <main id="paperContent"></main>

  <script src="news.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const today = new Date();
      document.getElementById('currentDateLabel').textContent = today.toLocaleDateString('es-ES', { 
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
      });

      const news = NewsManager.getAllNews();
      
      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(today.getDate() - 7);
      sevenDaysAgo.setHours(0,0,0,0);

      const weeklyNews = news.filter(article => {
        if (!article.fecha && !article.date) return false;
        
        let articleDate;
        const rawDate = article.fecha || article.date;
        
        if (rawDate.includes('-')) {
          const [year, month, day] = rawDate.split('-');
          articleDate = new Date(year, month - 1, day);
        } else {
          articleDate = new Date(rawDate);
        }
        
        return articleDate >= sevenDaysAgo && articleDate <= today;
      });

      const container = document.getElementById('paperContent');

      if (weeklyNews.length === 0) {
        container.innerHTML = '<div class="no-news">No hay noticias publicadas en los últimos 7 días.</div>';
        return;
      }

      let html = '';
      
      // Artículo principal
      const featured = weeklyNews[0];
      const featuredTitle = featured.title || featured.titulo || 'Sin título';
      const featuredContent = featured.text || featured.contenido || '';
      
      html += `
        <div class="featured-article">
          <h1 class="headline">${featuredTitle}</h1>
          <div class="article-meta">${featured.fecha || featured.date} • ${featured.autor || 'Redacción'}</div>
          <div class="article-content">${featuredContent}</div>
        </div>
      `;

      // Resto de artículos en columnas
      if (weeklyNews.length > 1) {
        html += '<div class="columns">';
        for (let i = 1; i < weeklyNews.length; i++) {
          const article = weeklyNews[i];
          const title = article.title || article.titulo || 'Sin título';
          let content = article.text || article.contenido || '';
          
          if (content.length > 600) {
            content = content.substring(0, 600) + '...';
          }

          html += `
            <div class="article">
              <h2 class="headline">${title}</h2>
              <div class="article-meta">${article.fecha || article.date}</div>
              <div class="article-content">${content}</div>
            </div>
          `;
        }
        html += '</div>';
      }

      container.innerHTML = html;

      setTimeout(() => {
        if(weeklyNews.length > 0) window.print();
      }, 500);
    });
  </script>
</body>
</html>
