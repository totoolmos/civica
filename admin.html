<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Civica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1410;
      --paper: #f5f0e8;
      --rust: #c0392b;
      --border: #c8bfb0;
      --dark-bg: #0f0f0f;
      --dark-secondary: #1a1410;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #ffffff;
      color: var(--ink);
      font-family: 'Source Serif 4', serif;
      min-height: 100vh;
    }

    header {
      background: #ffffff;
      border-bottom: 2px solid var(--rust);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--rust);
    }

    .header-nav {
      display: flex;
      gap: 1.5rem;
    }

    .header-nav a {
      color: var(--paper);
      text-decoration: none;
      font-size: 0.9rem;
      font-family: 'IBM Plex Mono', monospace;
      transition: color 0.2s ease;
    }

    .header-nav a:hover {
      color: var(--rust);
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .admin-section {
      background: #ffffff;
      border: 2px solid var(--rust);
      padding: 2rem;
    }

    .admin-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--rust);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      color: var(--border);
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 0.75rem;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--border);
      font-family: 'Source Serif 4', serif;
      font-size: 0.95rem;
      transition: border-color 0.2s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--rust);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .image-upload-zone {
      border: 2px dashed var(--rust);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(192, 57, 43, 0.05);
    }

    .image-upload-zone:hover {
      background: rgba(192, 57, 43, 0.1);
    }

    .image-upload-zone input {
      display: none;
    }

    .upload-text {
      font-size: 0.9rem;
      color: var(--border);
    }

    .image-preview {
      max-width: 100%;
      max-height: 200px;
      margin-top: 1rem;
      border: 1px solid var(--border);
      display: none;
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
      max-height: 120px;
      overflow-y: auto;
    }

    .tag-checkbox {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.8rem;
      background: rgba(192, 57, 43, 0.1);
      border: 1px solid var(--rust);
      cursor: pointer;
      border-radius: 3px;
      font-size: 0.75rem;
    }

    .tag-checkbox input {
      width: auto;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    button {
      flex: 1;
      padding: 0.75rem 1.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
      border: 1px solid var(--rust);
      background: var(--rust);
      color: var(--paper);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #a0311f;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(192, 57, 43, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--rust);
    }

    .btn-secondary:hover {
      background: rgba(192, 57, 43, 0.1);
    }

    .message {
      padding: 0.75rem;
      border-radius: 3px;
      margin-bottom: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      display: none;
    }

    .message.success {
      background: #1b5e20;
      color: #c8e6c9;
      display: block;
    }

    .message.error {
      background: #b71c1c;
      color: #ffcdd2;
      display: block;
    }

    .news-list {
      display: grid;
      gap: 1rem;
      max-height: 600px;
      overflow-y: auto;
    }

    .news-item {
      background: var(--paper);
      color: var(--ink);
      padding: 1.5rem;
      border: 1px solid var(--border);
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 1.5rem;
      align-items: start;
    }

    .news-item-image {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    .news-item-content {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .news-item-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--rust);
    }

    .news-item-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--border);
    }

    .news-item-text {
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .news-item-actions {
      display: flex;
      gap: 0.5rem;
      flex-direction: column;
      justify-content: flex-start;
    }

    .news-item-actions button {
      padding: 0.5rem;
      font-size: 0.7rem;
      margin: 0;
    }

    @media (max-width: 768px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }

      .news-item {
        grid-template-columns: 1fr;
      }

      .news-item-image {
        width: 100%;
        height: 200px;
      }

      header {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">Civica — Panel</div>
    <nav class="header-nav">
      <a href="/">Inicio</a>
      <a href="/admin.html">Panel</a>
    </nav>
  </header>

  <main>
    <div class="admin-grid">
      <div class="admin-section">
        <h2 class="admin-title">Nueva Noticia</h2>

        <div id="successMessage" class="message success"></div>
        <div id="errorMessage" class="message error"></div>

        <form id="newsForm">
          <div class="form-group">
            <label for="newsTitle">Título</label>
            <input type="text" id="newsTitle" required placeholder="Título de la noticia" />
          </div>

          <div class="form-group">
            <label for="newsText">Contenido</label>
            <textarea id="newsText" required placeholder="Contenido de la noticia"></textarea>
          </div>

          <div class="form-group">
            <label>Imagen</label>
            <div class="image-upload-zone" id="imageUploadZone">
              <div class="upload-text">Arrastra imagen aquí o haz clic</div>
              <input type="file" id="imageInput" accept="image/*" />
              <img id="imagePreview" class="image-preview" />
            </div>
            <input type="hidden" id="imageBase64" />
          </div>

          <div class="form-group">
            <label>Etiquetas</label>
            <div class="tags-container" id="tagsContainer"></div>
          </div>

          <div class="button-group">
            <button type="submit" id="submitBtn">Publicar</button>
            <button type="button" class="btn-secondary" id="cancelBtn" style="display: none;">Cancelar</button>
          </div>
        </form>
      </div>

      <div class="admin-section">
        <h2 class="admin-title">Noticias</h2>
        <div id="newsList" class="news-list"></div>
      </div>
    </div>
  </main>

  <script src="news.js"></script>
  <script>
    let editingNewsId = null;

    document.addEventListener('DOMContentLoaded', () => {
      setupEventListeners();
      renderNewsList();
      loadPredefinedTags();
    });

    function setupEventListeners() {
      const newsForm = document.getElementById('newsForm');
      const imageUploadZone = document.getElementById('imageUploadZone');
      const imageInput = document.getElementById('imageInput');
      const cancelBtn = document.getElementById('cancelBtn');

      imageUploadZone.addEventListener('click', () => imageInput.click());
      imageUploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        imageUploadZone.style.backgroundColor = 'rgba(192, 57, 43, 0.15)';
      });
      imageUploadZone.addEventListener('dragleave', () => {
        imageUploadZone.style.backgroundColor = 'rgba(192, 57, 43, 0.05)';
      });
      imageUploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        imageUploadZone.style.backgroundColor = 'rgba(192, 57, 43, 0.05)';
        if (e.dataTransfer.files.length > 0) {
          handleImageFile(e.dataTransfer.files[0]);
        }
      });

      imageInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          handleImageFile(e.target.files[0]);
        }
      });

      newsForm.addEventListener('submit', (e) => {
        e.preventDefault();
        saveNews();
      });

      cancelBtn.addEventListener('click', () => {
        editingNewsId = null;
        newsForm.reset();
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('imageBase64').value = '';
        document.getElementById('submitBtn').textContent = 'Publicar';
        cancelBtn.style.display = 'none';
        clearSelectedTags();
      });
    }

    function handleImageFile(file) {
      const maxSize = 2 * 1024 * 1024;
      if (file.size > maxSize) {
        showError('La imagen no debe superar 2MB');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        const base64 = e.target.result;
        document.getElementById('imageBase64').value = base64;
        const preview = document.getElementById('imagePreview');
        preview.src = base64;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function loadPredefinedTags() {
      const tags = ['Política', 'Deportes', 'Cultura', 'Tecnología', 'Economía', 'Salud', 'Educación', 'Medio Ambiente', 'Social', 'Opinión'];
      const container = document.getElementById('tagsContainer');
      container.innerHTML = '';

      tags.forEach(tag => {
        const label = document.createElement('label');
        label.className = 'tag-checkbox';
        label.innerHTML = `
          <input type="checkbox" value="${tag}" />
          <span>${tag}</span>
        `;
        container.appendChild(label);
      });
    }

    function getSelectedTags() {
      const checkboxes = document.querySelectorAll('#tagsContainer input[type="checkbox"]:checked');
      return Array.from(checkboxes).map((cb) => cb.value);
    }

    function clearSelectedTags() {
      document.querySelectorAll('#tagsContainer input[type="checkbox"]').forEach((cb) => {
        cb.checked = false;
      });
    }

    function setSelectedTags(tags) {
      clearSelectedTags();
      tags.forEach(tag => {
        const checkbox = document.querySelector(`#tagsContainer input[value="${tag}"]`);
        if (checkbox) checkbox.checked = true;
      });
    }

    function saveNews() {
      const submitBtn = document.getElementById('submitBtn');
      const title = document.getElementById('newsTitle').value.trim();
      const text = document.getElementById('newsText').value.trim();
      const image = document.getElementById('imageBase64').value;
      const tags = getSelectedTags();

      if (!title || !text) {
        showError('Título y contenido son obligatorios');
        return;
      }

      try {
        if (editingNewsId) {
          NewsManager.updateNews(editingNewsId, title, text, image || null, tags);
          showSuccess('Noticia actualizada');
        } else {
          NewsManager.addNews(title, text, image || null, tags);
          showSuccess('Noticia publicada');
        }

        document.getElementById('newsForm').reset();
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('imageBase64').value = '';
        document.getElementById('submitBtn').textContent = 'Publicar';
        document.getElementById('cancelBtn').style.display = 'none';
        clearSelectedTags();
        editingNewsId = null;

        renderNewsList();
      } catch (error) {
        console.error('Error saving news:', error);
        showError('Error al guardar la noticia');
      }
    }

    function renderNewsList() {
      const news = NewsManager.getAllNews();
      const container = document.getElementById('newsList');
      container.innerHTML = '';

      if (!news || news.length === 0) {
        container.innerHTML = '<p style="color: var(--border);">No hay noticias publicadas aún</p>';
        return;
      }

      news.forEach(article => {
        const newsEl = document.createElement('div');
        newsEl.className = 'news-item';
        newsEl.innerHTML = `
          ${article.image ? `<img src="${article.image}" alt="${article.title}" class="news-item-image" />` : '<div class="news-item-image" style="background: var(--border);"></div>'}
          <div class="news-item-content">
            <div class="news-item-title">${article.title}</div>
            <div class="news-item-date">${article.date || new Date().toLocaleDateString()}</div>
            <div class="news-item-text">${article.text.substring(0, 120)}...</div>
          </div>
          <div class="news-item-actions">
            <button onclick="editNews(${article.id})">Editar</button>
            <button onclick="deleteNews(${article.id})" class="btn-secondary">Eliminar</button>
          </div>
        `;
        container.appendChild(newsEl);
      });
    }

    function editNews(id) {
      id = parseInt(id, 10);
      const article = NewsManager.getNewsById(id);
      if (!article) {
        showError('Noticia no encontrada');
        return;
      }

      editingNewsId = id;
      document.getElementById('newsTitle').value = article.title;
      document.getElementById('newsText').value = article.text;
      
      if (article.image) {
        document.getElementById('imageBase64').value = article.image;
        const preview = document.getElementById('imagePreview');
        preview.src = article.image;
        preview.style.display = 'block';
      }

      if (article.tags) {
        setSelectedTags(article.tags);
      }

      document.getElementById('submitBtn').textContent = 'Guardar Cambios';
      document.getElementById('cancelBtn').style.display = 'flex';

      document.getElementById('newsForm').scrollIntoView({ behavior: 'smooth' });
    }

    function deleteNews(id) {
      id = parseInt(id, 10);
      if (!confirm('¿Estás seguro de que deseas eliminar esta noticia?')) {
        return;
      }

      try {
        NewsManager.deleteNews(id);
        showSuccess('Noticia eliminada');
        renderNewsList();
      } catch (error) {
        console.error('Error deleting:', error);
        showError('Error al eliminar');
      }
    }

    function showSuccess(message) {
      const el = document.getElementById('successMessage');
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => {
        el.style.display = 'none';
      }, 3000);
    }

    function showError(message) {
      const el = document.getElementById('errorMessage');
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => {
        el.style.display = 'none';
      }, 3000);
    }
  </script>
</body>
</html>
